# ============================================================
# Server
# ============================================================
#server.port=8081
server.servlet.context-path=/


# ============================================================
# Application
# ============================================================
spring.application.name=fmcg-ecommerce

# ============================================================
# Database (PostgreSQL)
# ============================================================
#You can override these in Render using Environment Variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

#spring.datasource.url=${SPRING_DATASOURCE_URL}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
#spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}

#spring.flyway.default-schema=ecommerce
#spring.flyway.schemas=ecommerce

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.default_schema=ecommerce

spring.datasource.driver-class-name=org.postgresql.Driver


# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# ============================================================
# Flyway (Database Migrations)
# ============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# ============================================================
# Mail (Gmail SMTP)
# Change MAIL_USERNAME and MAIL_PASSWORD in environment variables
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET:fmcg-ecommerce-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
# 10 hours in milliseconds
jwt.access-token-expiry=36000000
# 30 days in milliseconds
jwt.refresh-token-expiry=2592000000

# ============================================================
# OTP Configuration
# ============================================================
otp.expiry-minutes=10
otp.max-attempts=3
otp.length=6

# ============================================================
# App Configuration
# ============================================================
app.name=FMCG eCommerce
app.base-url=${APP_BASE_URL:http://localhost:8081}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.upload-dir=${UPLOAD_DIR:uploads}

# ============================================================
# Billing Software Integration
# ============================================================
billing.base-url=${BILLING_BASE_URL:http://localhost:8080}
billing.enabled=${BILLING_INTEGRATION_ENABLED:false}

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.info.title=FMCG eCommerce API
springdoc.info.version=1.0.0
springdoc.info.description=Backend API for FMCG eCommerce Application

# ============================================================
# Logging
# ============================================================
logging.level.com.fmcg.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
